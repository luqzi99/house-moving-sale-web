services:
  app:
    build: .
    container_name: house-clearance-app
    restart: unless-stopped
    env_file: .env
    ports:
      - "8000:8000"
    volumes:
      - .:/var/www/html
      - vendor_cache:/var/www/html/vendor
      - bootstrap_cache:/var/www/html/bootstrap/cache
    depends_on:
      db:
        condition: service_healthy
    networks:
      - local_net

  db:
    image: mysql:8.0
    container_name: house-clearance-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${DB_ROOT_PASSWORD}
      MYSQL_DATABASE: ${DB_DATABASE}
      MYSQL_USER: ${DB_USERNAME}
      MYSQL_PASSWORD: ${DB_PASSWORD}
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - local_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 5

  phpmyadmin:
    image: phpmyadmin:latest
    container_name: house-clearance-pma
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      PMA_HOST: house-clearance-mysql
      PMA_USER: root
      PMA_PASSWORD: ${DB_ROOT_PASSWORD}
    depends_on:
      - db
    networks:
      - local_net

volumes:
  db_data:
  vendor_cache:
  bootstrap_cache:

networks:
  local_net:
    driver: bridge
